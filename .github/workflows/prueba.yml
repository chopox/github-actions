name: CI Pipeline Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Simulate installing dependencies
        run: echo "Simulando npm install (sin package.json)"

      - name: Simulate running tests
        run: echo "Simulando npm test (sin código real)"

      - name: List repo structure (debug)
        run: ls -R
